# For more information on configuration, see:
#   * Official English Documentation: http://nginx.org/en/docs/
#   * Official Russian Documentation: http://nginx.org/ru/docs/

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log;
pid /run/nginx.pid;

# Load dynamic modules. See /usr/share/doc/nginx/README.dynamic.
include /usr/share/nginx/modules/*.conf;

events {
    worker_connections 1024;
}

http {
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 4096;

    include             /etc/nginx/mime.types;
    default_type        application/octet-stream;

    # Load modular configuration files from the /etc/nginx/conf.d directory.
    # See http://nginx.org/en/docs/ngx_core_module.html#include
    # for more information.
    include /etc/nginx/conf.d/*.conf;

        upstream contab {
                server 127.0.0.1:3000;
                keepalive 64;
        }

	upstream loadbalancer {
		least_conn;
		server localhost:3333;
	}

        server {
                server_name vecontab.com;
#               root    /usr/share/nginx/html;

                location / {
                        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                        #proxy_set_header X-Forwarded-For $remote_addr;
                        proxy_set_header X-Real-IP $remote_addr;
                        proxy_set_header Host $http_host;

                        proxy_http_version 1.1;
                        proxy_set_header Upgrade $http_upgrade;
                        proxy_set_header Connection "upgrade";

                        proxy_pass http://127.0.0.1:3000;
                        proxy_redirect off;
                        proxy_read_timeout 240s;
                }


		location /api/ {
			proxy_pass http://loadbalancer/;
			proxy_buffering on;
		}


                listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/vecontab.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/vecontab.com/privkey.pem; # managed by Certbot
                include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
                ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

        
	

}

        server {
    		if ($host = vecontab.com) {
        		return 301 https://$host$request_uri;
    		} # managed by Certbot


                listen 80;
                server_name vecontab.com;
    		return 404; # managed by Certbot



	}


}
