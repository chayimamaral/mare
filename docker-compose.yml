services:
  # O Backend em Go
  vecx-backend:
    build: 
      context: ./backend # Ajuste para o caminho da sua pasta go
      dockerfile: Dockerfile
    ports:
      - "3333:3333" # Porta que seu app Go costuma usar
    environment:
      - DATABASE_URL=postgres://camaral:suasenha@db:5432/vecontab?sslmode=disable
    depends_on:
      - db

  # O Frontend Next.js que acabamos de buildar
  vecx-frontend:
    image: vecontab-frontend:v1
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:8080"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3333 # O browser do host acessa via localhost
    depends_on:
      - vecontab-backend

  # Banco de Dados PostgreSQL
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=camaral
      - POSTGRES_PASSWORD=suasenha
      - POSTGRES_DB=vecontab
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: